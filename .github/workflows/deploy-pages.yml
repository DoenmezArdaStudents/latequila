name: Deploy static site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare site files
        run: |
          mkdir -p _site
          shopt -s nullglob
          html_files=(./*.html)
          if [ ${#html_files[@]} -eq 0 ]; then
            echo "No HTML files found in repository root. Add at least one .html file to root or update this workflow path."
            exit 1
          fi
          cp "${html_files[@]}" _site/
          for dir in css js assets img images fonts media; do
            if [ -d "$dir" ]; then cp -r "$dir" _site/; fi
          done

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
